<!DOCTYPE html>
<html>
<head>
  <title>Tron Test</title>
</head>
<body>

<h2>Tron Test (Send 1 TRX)</h2>

<button onclick="connectWallet()">Connect Wallet</button>
<br><br>

<button onclick="sendTrx()">Sign & Send 1 TRX</button>

<script>
async function connectWallet() {
  if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
    alert("Connected: " + window.tronWeb.defaultAddress.base58);
  } else {
    alert("Open in TronLink or Trust Wallet dApp browser");
  }
}

async function sendTrx() {
  try {
    const tronWeb = window.tronWeb;

    const from = tronWeb.defaultAddress.base58;
    const to = from; // sending to yourself (safe)
    const amount = 1 * 1e6; // 1 TRX (Sun)

    // Build transaction
    const tx = await tronWeb.transactionBuilder.sendTrx(
      to,
      amount,
      from
    );

    // This triggers wallet popup
    const signed = await tronWeb.trx.sign(tx);

    // Broadcast
    const result = await tronWeb.trx.sendRawTransaction(signed);

    console.log(result);
    alert("Done! Check wallet / Tronscan");

  } catch (e) {
    console.error(e);
    alert("Error occurred");
  }
}
</script>

</body>
</html>
