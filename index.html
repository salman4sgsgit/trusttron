<!DOCTYPE html>
<html>
<head>
  <title>Tron Test - Trust Wallet</title>
</head>
<body>

<h2>Trust Wallet TRON Test</h2>

<button onclick="connectWallet()">Connect</button>
<br><br>

<button onclick="sendTrx()">Sign & Send 1 TRX</button>

<script>
let provider = null;

function getProvider() {
  // Try common injected providers
  if (window.tronWeb) return window.tronWeb; // fallback
  if (window.trustwallet) return window.trustwallet;
  if (window.ethereum) return window.ethereum; // sometimes used as bridge

  return null;
}

async function connectWallet() {
  provider = getProvider();

  if (!provider) {
    alert("No provider found. Open inside Trust Wallet dApp browser.");
    return;
  }

  try {
    // Try generic request (WalletConnect-style)
    if (provider.request) {
      const res = await provider.request({
        method: "tron_requestAccounts"
      });
      console.log(res);
      alert("Connected!");
    } else {
      alert("Provider detected but no request method");
    }
  } catch (e) {
    console.error(e);
    alert("Connection failed");
  }
}

async function sendTrx() {
  provider = getProvider();

  if (!provider || !provider.request) {
    alert("Provider not available");
    return;
  }

  try {
    // ⚠️ Simplified transaction request
    const tx = {
      to: "TVjZX4fPi1uNBJBKBkcATg4qoqyT2T4KCt", // put your own testnet address
      value: "1000000" // 1 TRX in SUN
    };

    const result = await provider.request({
      method: "tron_signTransaction",
      params: [tx]
    });

    console.log(result);
    alert("Transaction signed (check wallet)");

  } catch (e) {
    console.error(e);
    alert("Error: " + e.message);
  }
}
</script>

</body>
</html>
