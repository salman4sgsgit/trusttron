<!DOCTYPE html>
<html>
<head>
  <title>Tron Test</title>
</head>
<body>

<h2>Tron Test (Trust Wallet)</h2>

<button onclick="connectWallet()">Connect Wallet</button>
<br><br>

<button onclick="sendTrx()">Sign & Send 1 TRX</button>

<script>
function connectWallet() {
  if (window.tronWeb) {
    alert("Wallet detected");
    console.log(window.tronWeb);
  } else {
    alert("Trust Wallet may not support TronWeb injection");
  }
}

async function sendTrx() {
  try {
    if (!window.tronWeb) {
      alert("TronWeb not available in Trust Wallet");
      return;
    }

    const tronWeb = window.tronWeb;

    const from = tronWeb.defaultAddress.base58;
    const to = from;
    const amount = 1 * 1e6;

    const tx = await tronWeb.transactionBuilder.sendTrx(to, amount, from);

    const signed = await tronWeb.trx.sign(tx);
    const result = await tronWeb.trx.sendRawTransaction(signed);

    console.log(result);
    alert("Transaction sent");

  } catch (e) {
    console.error(e);
    alert("Error: " + e.message);
  }
}
</script>

</body>
</html>
